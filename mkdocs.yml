site_name: 匡院笔记分享
site_url: https://water-mi.github.io/kym-doc/
nav:
  - 主页: index.md
  - 计算机科学与技术:
    - 编译原理: 
      - 课程介绍: cs/compiler/about.md
      - cs/compiler/chapter1.md
      - cs/compiler/chapter3.md
      - cs/compiler/chapter4.md
      - cs/compiler/chapter9.md
    - 计算机网络: 
      - 课程介绍: cs/computer_network/about.md
      - cs/computer_network/chapter1.md
      - cs/computer_network/chapter2/c2.md
      - cs/computer_network/chapter3/c3.md
      - cs/computer_network/chapter4/c4.md
      - cs/computer_network/chapter5/c5.md
      - cs/computer_network/chapter6/c6.md
      - cs/computer_network/chapter7/c7.md

theme: 
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.prune
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode 
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      line_spans: __span
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - https://unpkg.com/katex@0/dist/katex.min.css